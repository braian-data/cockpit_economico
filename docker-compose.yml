services:
  db:
    image: postgres:15-alpine
    container_name: pg_cockpit_database
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5454:5432"
    volumes:
      - pg_cockpit_data:/var/lib/postgresql/data

  pipeline:
    build: .
    container_name: python_pipeline_motor
    env_file:
      - .env
    depends_on:
      - db
    restart: "no"

volumes:
  pg_cockpit_data:
